services:
  trino-coordinator:
    image: trinodb/trino:479
    container_name: trino-coordinator
    hostname: trino-coordinator
    ports:
      - "8080:8080"
    volumes:
      - ./coordinator/etc:/etc/trino

  trino-worker-1:
    image: trinodb/trino:479
    container_name: trino-worker-1
    hostname: trino-worker-1
    volumes:
      - ./worker-1/etc:/etc/trino

  trino-worker-2:
    image: trinodb/trino:479
    container_name: trino-worker-2
    hostname: trino-worker-2
    volumes:
      - ./worker-2/etc:/etc/trino