version: "3.8"

configs:
  superset_config:
    content: |
      SECRET_KEY = "my-pet-project-secret-key-change-me"

      SQLALCHEMY_DATABASE_URI = (
          "postgresql+psycopg2://superset:superset@superset-db:5432/superset"
      )

      SUPERSET_WEBSERVER_PROTOCOL = "http"
      SUPERSET_WEBSERVER_ADDRESS = "0.0.0.0"
      SUPERSET_WEBSERVER_PORT = 8088

      SUPERSET_LOAD_EXAMPLES = False

      CACHE_CONFIG = {
          "CACHE_TYPE": "SimpleCache",
          "CACHE_DEFAULT_TIMEOUT": 300,
      }
      DATA_CACHE_CONFIG = CACHE_CONFIG

services:
  trino:
    image: trinodb/trino:479
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./etc:/etc/trino

  superset-db:
    image: postgres:13
    container_name: superset-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 5s
      timeout: 5s
      retries: 5

  superset-init:
    image: apache/superset:6.0.0-dev
    container_name: superset-init
    depends_on:
      superset-db:
        condition: service_healthy
    environment:
      SUPERSET_CONFIG_PATH: /etc/superset/superset_config.py
    configs:
      - source: superset_config
        target: /etc/superset/superset_config.py
    command:
      - bash
      - -c
      - |
        set -e
        echo 'Upgrading database...'
        superset db upgrade
        echo 'Creating admin user...'
        superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@localhost --password admin
        echo 'Initializing roles...'
        superset init
        echo '=== Init complete ==='

  superset:
    image: apache/superset:6.0.0-dev
    container_name: superset
    restart: unless-stopped
    depends_on:
      superset-db:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully
    environment:
      SUPERSET_CONFIG_PATH: /etc/superset/superset_config.py
    configs:
      - source: superset_config
        target: /etc/superset/superset_config.py
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
    command: >
      bash -c "superset run -h 0.0.0.0 -p 8088 --with-threads"

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

volumes:
  superset_db_data:
  superset_home: